# =============================================================================
# docker-compose.override.yml — Hot-reload development overrides
# =============================================================================
#
# Docker Compose automatically merges this file on top of docker-compose.yml
# when you run `docker compose up` locally.  In CI / production it is never
# present, so the production compose file runs unmodified.
#
# Changes from production:
#   backend       — single worker, --reload, source bind-mounted
#   celery_worker — source bind-mounted, watchmedo auto-restart
#   frontend      — replaced by the Vite dev server (port 5173)
#   postgres      — port exposed on host for local DB tools
#   flower        — no basic_auth in dev
# =============================================================================

services:

  # ── Backend (hot-reload) ───────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     deps          # Stop at deps stage — no COPY . .
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/app
        --proxy-headers
    volumes:
      - ./backend:/app                                # live source mount
      - repo_data:/app/repo
      - chroma_data:/app/chroma_polyglot_storage
      - backend_logs:/app/logs
      - auto_tests:/app/auto_tests
    environment:
      DEBUG: "true"
      # Disable worker count so --reload works (single process only)

  # ── Celery worker (auto-restart on file change) ────────────────────────────
  celery_worker:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     deps
    command: >
      watchmedo auto-restart
        --directory=/app/app
        --pattern=*.py
        --recursive
        -- celery -A app.workers.celery_app.celery_app worker
             --loglevel=debug
             --concurrency=1
             --queues=celery,pipeline
             --hostname=worker-dev@%h
    volumes:
      - ./backend:/app
      - repo_data:/app/repo
      - chroma_data:/app/chroma_polyglot_storage
      - backend_logs:/app/logs
      - auto_tests:/app/auto_tests

  # ── Celery beat ────────────────────────────────────────────────────────────
  celery_beat:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     deps
    command: >
      celery -A app.workers.celery_app.celery_app beat
        --loglevel=debug
    volumes:
      - ./backend:/app

  # ── Flower (no auth in dev) ───────────────────────────────────────────────
  flower:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     deps
    image: autonomous-ai-testing/backend:${IMAGE_TAG:-latest}
    container_name: ai-test-flower
    command: >
      celery -A app.workers.celery_app.celery_app flower
        --port=5555
        --url_prefix=flower
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    networks:
      - app_network
    restart: unless-stopped

  # ── Frontend — replaced by Vite dev server ────────────────────────────────
  # In development the React app runs on the host via `pnpm dev` (port 5173).
  # This stub prevents the nginx container from starting while still satisfying
  # the depends_on from other services if needed.
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile.dev    # Lightweight image that just runs pnpm dev
      target:     dev
    command: pnpm dev --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules           # anonymous volume — don't overwrite installed packages
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_API_KEY:      ""

  # ── Postgres — expose for local tools (pgAdmin, DBeaver, etc.) ────────────
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
