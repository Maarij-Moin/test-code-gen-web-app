# =============================================================================
# nginx.conf — Autonomous AI Testing Platform (Frontend Container)
# =============================================================================
#
# This file is processed by envsubst (via the nginx docker-entrypoint) before
# nginx starts.  Variables available at runtime:
#   $API_KEY       Forwarded as X-API-Key header to the backend proxy
#
# Proxy map:
#   /api/*         → http://backend:8000/*    (strips /api prefix)
#   /webhooks/*    → http://backend:8000/webhooks/*
#   /ws            → ws://backend:8000/ws     (WebSocket upgrade)
#   /*             → /usr/share/nginx/html    (SPA fallback to index.html)
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security ──────────────────────────────────────────────────────────────
    server_tokens off;
    client_max_body_size 50m;

    # Security headers (relax CSP per-deployment as needed)
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ── Rate limiting (shared memory zones) ───────────────────────────────────
    # Defined at http{} level in nginx.conf — if you can't modify the base
    # nginx.conf, remove these limit_req_zone directives and the limit_req lines.
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # limit_req_zone $binary_remote_addr zone=webhook:10m rate=10r/s;

    # ── Health check (no logging, no auth required) ───────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── Backend API proxy (/api/* → backend:8000/*) ───────────────────────────
    location /api/ {
        # limit_req zone=api burst=50 nodelay;

        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward the static API key (envsubst fills in $API_KEY at startup)
        proxy_set_header X-API-Key "${API_KEY}";

        # Timeouts — generous for LLM calls (up to 10 min)
        proxy_connect_timeout  10s;
        proxy_read_timeout     600s;
        proxy_send_timeout     120s;

        # Buffer tuning for streamed LLM responses
        proxy_buffering    off;
        proxy_buffer_size  16k;
    }

    # ── Webhook endpoint (direct, not under /api/) ────────────────────────────
    location /webhooks/ {
        # limit_req zone=webhook burst=20 nodelay;

        proxy_pass         http://backend:8000/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Webhook payloads can be large (e.g. monorepo push events)
        client_max_body_size 10m;
        proxy_read_timeout   30s;
    }

    # ── WebSocket upgrade (/ws → backend:8000/ws) ─────────────────────────────
    location /ws {
        proxy_pass         http://backend:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Static assets (long-lived cache) ─────────────────────────────────────
    # Vite hashes asset filenames, so immutable caching is safe.
    location ~* \.(css|js|mjs|woff2?|svg|png|jpg|jpeg|gif|ico|webp)$ {
        try_files $uri =404;
        expires        1y;
        add_header     Cache-Control "public, immutable";
        access_log     off;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # All unmatched routes serve index.html so React Router handles navigation.
    location / {
        try_files  $uri /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Deny hidden files (.git, .env, etc.) ──────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
